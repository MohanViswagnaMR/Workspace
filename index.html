<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%97%A7%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Boot screen: hidden by React once the workspace mounts -->
    <div id="boot">

      <div class="boot-bar"><i></i></div>

    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
